# I-JEPA-300 baseline pre-training for TexJEPA.
#
# This is the public 300-epoch baseline checkpoint lineage used before any
# TexJEPA specialization. It follows the original I-JEPA joint-embedding
# predictive objective with a ViT-H/14 context encoder, EMA target encoder,
# 12-layer predictor, and multi-block masking on MIMIC-CXR-JPG chest radiographs.

data:
  dataset_type: mimic_cxr
  root_path: data/mimic-cxr-384
  use_zip: false
  splits: null
  batch_size: 128
  crop_size: 224
  crop_scale: [0.3, 1.0]
  num_workers: 10
  pin_mem: true
  normalization: chest_xray
  use_color_distortion: false
  use_gaussian_blur: false
  use_horizontal_flip: false
  color_jitter_strength: 0.0

logging:
  folder: logs/ijepa_300
  write_tag: jepa

mask:
  allow_overlap: false
  aspect_ratio: [0.75, 1.5]
  enc_mask_scale: [0.85, 1.0]
  min_keep: 10
  num_enc_masks: 1
  num_pred_masks: 4
  patch_size: 14
  pred_mask_scale: [0.15, 0.2]

meta:
  load_checkpoint: false
  model_name: vit_huge
  patch_size: 14
  pred_depth: 12
  pred_emb_dim: 384
  read_checkpoint: null
  use_bfloat16: true
  num_registers: 0

optimization:
  ema: [0.998, 1.0]
  epochs: 300
  final_lr: 1.0e-06
  final_weight_decay: 0.4
  ipe_scale: 1.25
  lr: 2.0e-04
  start_lr: 1.0e-05
  warmup: 30
  weight_decay: 0.04
