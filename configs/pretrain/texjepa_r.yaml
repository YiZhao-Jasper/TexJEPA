# TexJEPA-R: register-token texture routing.
#
# Warm-start from TexJEPA-N and train for 50 additional epochs. TexJEPA-R keeps
# the context-only texture corruption curriculum, adds four learnable register
# tokens to the encoder, and tightens the masking distribution so the encoder
# must rely on more local, lesion-scale structure.

data:
  dataset_type: mimic_cxr
  root_path: data/mimic-cxr-384
  use_zip: false
  splits: null
  batch_size: 128
  crop_size: 224
  crop_scale: [0.3, 1.0]
  num_workers: 10
  pin_mem: true
  normalization: chest_xray
  use_color_distortion: false
  use_gaussian_blur: false
  use_horizontal_flip: false
  color_jitter_strength: 0.0
  context_noise:
    enabled: true
    p_gauss: 0.5
    p_poisson: 0.3
    p_jpeg: 0.2
    sigma_range: [0.005, 0.05]
    peak_range: [50, 200]
    quality_range: [40, 80]
    warmup_epochs: 5

logging:
  folder: logs/texjepa_r
  write_tag: jepa

mask:
  allow_overlap: false
  aspect_ratio: [0.5, 2.0]
  enc_mask_scale: [0.65, 0.85]
  min_keep: 10
  num_enc_masks: 1
  num_pred_masks: 6
  patch_size: 14
  pred_mask_scale: [0.15, 0.25]

meta:
  load_checkpoint: true
  model_name: vit_huge_reg
  num_registers: 4
  patch_size: 14
  pred_depth: 12
  pred_emb_dim: 384
  read_checkpoint: ../texjepa_n/jepa-latest.pth.tar
  use_bfloat16: true

optimization:
  ema: [0.999, 1.0]
  epochs: 50
  final_lr: 1.0e-06
  final_weight_decay: 0.4
  ipe_scale: 1.25
  lr: 5.0e-05
  start_lr: 1.0e-06
  warmup: 5
  weight_decay: 0.04
